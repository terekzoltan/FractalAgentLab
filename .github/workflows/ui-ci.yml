name: UI CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ui-ci:
    runs-on: ubuntu-latest
    env:
      CI: true
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci

      - name: Typecheck UI
        run: npm run typecheck

      - name: Test UI
        run: npm test

      - name: Build UI
        run: npm run build
